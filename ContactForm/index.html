<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <header class="header">
        <div class="conteiner conteiner--flex-column
">
            <img class="header__logo" src="./images/Vector.svg" alt="">
            <h1 class="header__title">Conect Form</h1>
            <p class="header__text">Insira os dados do contato e clique em cadastrar!</p>
        </div>
    </header>

    <main>
        <div class="conteiner">
            <form action="contact-form">
                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="Nome">Nome</label>
                    </div>
                    <div class="contact-form__col-b">

                        <input class="contact-form__input contact-form__input--metade" name="Nome" id="Nome"
                            placeholder="Nome" type="text">
                        <input class="contact-form__input contact-form__input--metade" name="Sobrenome" id="Sobrenome"
                            placeholder="Sobrenome" type="text">
                    </div>
                </div>

                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="Email">Email</label>
                    </div>
                    <div class="contact-form__col-b">

                        <input class="contact-form__input--inteiro" name="Email" id="Email"
                            placeholder="Digite seu email" type="email">

                    </div>
                </div>

                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="Telefone">Telefone</label>


                    </div>
                    <div class="contact-form__col-b">

                        <input class="contact-form__input contact-form__input--terco" name="+55" id="+55"
                            placeholder="exx" type="text">
                        <input class="contact-form__input contact-form__input--terco" name="ddd" id="ddd"
                            placeholder="ddd" type="text">
                        <input class="contact-form__input contact-form__input--terco" name="ex.99999-9999"
                            id="ex" placeholder="ex.99999-9999" type="text">
                    </div>
                </div>

                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="Endereço">Endereço</label>


                    </div>
                    <div class="contact-form__col-b">

                        <input class="contact-form__input contact-form__input--quarto" name="cep" id="cep"
                            placeholder="cep" type="text">
                        <input class="contact-form__input contact-form__input--metade" name="Rua lá de casa"
                            id="Rua" placeholder="Rua lá de casa" type="text">
                        <input class="contact-form__input contact-form__input--quarto" name="ex: 5555" id="exyz"
                            placeholder="ex: 5555" type="text">

                    </div>
                </div>


                <div class="contact-form__linha">
                    <div class="contact-form__col-a">



                    </div>
                    <div class="contact-form__col-b">

                        <input class="contact-form__input contact-form__input--terco" name="app. 12 bloco. x"
                            id="appbloco " placeholder="app. 12 bloco. x" type="text">
                        <input class="contact-form__input contact-form__input--terco" name="Bairro" id="Bairro"
                            placeholder="Bairro" type="text">
                        <input class="contact-form__input contact-form__input--terco" name="Cidade" id="Cidade"
                            placeholder="Cidade" type="text">

                    </div>
                </div>

                <div class="contact-form__linha">
                    <div class="contact-form__col-a">



                    </div>
                    <div class="contact-form__col-b">

                        <input class="contact-form__input contact-form__input--terco" name="Estado" id="Estado"
                            placeholder="Estado" type="text">
                    </div>
                </div>

                <div class="contact-form__linha">
            <div class="contact-form__col-a">
              <label class="contact-form__label" for="Anotações">Anotações</label>
            </div>
            <div class="contact-form__col-b">
              <textarea 
                class="contact-form__textarea"  
                name="anotacoes" 
                id="anotacoes" placeholder="Anotações"
              ></textarea>
             
            </div>
          </div>
        
          <!-- Botões -->
          <div class="contact-form__linha">
            <div class="contact-form__col-a">
            </div>
            <div class="contact-form__col-b">
             <button 
                type="button"
                id="cadastrar"
                name="cadastrar"
                class="contact-form__button contact-form__input--metade"
                onclick="minhafuncao()"
              >Cadastrar</button>
             <button 
                type="reset"
                id="limpar"
                name="limpar"
                class="contact-form__button contact-form__input--metade"
             >Limpar</button>
            </div>
          </div>

        </form>
      </div>
    </main>
    <script>

            let Nome = document.getElementById("Nome").value.trim();

            let Endereço = document.getElementById("Endereço").value.trim();

        function forError(fildId){
          document.getElementById("fildId").style.border ="1px solid red";

        function reiniciaBorda(fildId){

        // }
    </script>
  </body>
</html>
